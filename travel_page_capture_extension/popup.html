<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><style>
body{font:13px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;width:430px;margin:0;padding:12px;background:#f8fafc;color:#111827}h1{font-size:16px;margin:0 0 8px}.hint{font-size:12px;color:#64748b}label{display:block;margin:8px 0 4px;color:#475569}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:8px;padding:8px;background:white;font:inherit}textarea{height:220px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.btn{border:0;border-radius:9px;padding:8px 10px;background:#111827;color:#fff;font-weight:700;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#0f172a}.btn.green{background:#15803d}.ok,.warn,.err{border-radius:9px;padding:8px;margin-top:8px;font-size:12px}.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
</style></head><body><h1>导入到俄罗斯旅行时间表 v4</h1><div class="hint">Ozon/RZD 等动态页面优先用“智能读取”。如果价格/地址没读到，可先用鼠标选中酒店核心区域，再点智能读取。</div><label>本地服务 endpoint</label><input id="endpoint" value="http://127.0.0.1:8765/plugin-import"><div class="row"><div><label>类型</label><select id="kind"><option value="auto">自动</option><option value="hotel">酒店</option><option value="train">火车/交通</option></select></div><div><label>城市表</label><select id="city"><option>莫斯科3晚</option><option>圣彼得堡3晚</option><option>喀山1晚</option><option>叶卡捷琳堡1晚</option><option>伊尔库茨克2晚</option><option>利斯特维扬卡1晚</option><option>奥利洪岛3晚</option><option>乌兰乌德1晚</option><option>符拉迪沃斯托克2晚</option><option>绥芬河1晚</option><option>其他/待定</option></select></div></div><div class="row"><div><label>默认日期</label><input id="defaultDate" type="date" value="2026-07-05"></div><div><label>默认时间</label><input id="defaultTime" type="time" value="14:00"></div></div><div class="btns"><button id="captureBtn" class="btn">智能读取当前页</button><button id="fullCaptureBtn" class="btn secondary">全文兜底</button><button id="sendBtn" class="btn green">发送到时间表</button></div><div id="status" class="warn">准备好了。</div><label>页面标题</label><input id="pageTitle"><label>页面链接</label><input id="pageUrl"><label>捕捉正文，可手动删改</label><textarea id="pageText"></textarea><div class="hint" id="counter">当前正文长度：0 字符</div><script src="popup.js"></script></body></html>
